name: CI

on:
  push:
    branches: [main, master, feat/**]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lojao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lojao"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lojao
      PGSSL: disable
      SESSION_SECRET: ci-session-secret
      TENANT_SLUG: loja
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: API tests
        run: pnpm --filter api test

      - name: DB migrate tests
        run: pnpm --filter @lojao/db test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm install --filter api... --filter admin... --filter storefront... --filter e2e... --frozen-lockfile

      - name: Verify Playwright CLI
        run: node apps/e2e/scripts/run-playwright.mjs --version

      - name: Install Playwright browsers
        run: node apps/e2e/scripts/run-playwright.mjs install --with-deps chromium

      # Ordem importa: deps + Playwright no host ANTES dos containers dev.
      # Entrypoints Docker rodam pnpm como root no bind mount → EACCES no runner.
      # Seed precisa de @lojao/db no host; sobe só db, seed, depois api/admin/storefront.
      - name: Start database
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d db
          timeout 60 bash -c 'until docker compose exec -T db pg_isready -U postgres -d lojao; do sleep 2; done'

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lojao
        run: node apps/api/scripts/run-seed.mjs || true

      - name: Start app stack
        run: |
          chmod +x scripts/ci-wait-url.sh
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d api
          scripts/ci-wait-url.sh api http://localhost:3001/health 180
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d admin storefront
          docker compose ps
          scripts/ci-wait-url.sh admin http://localhost:5173/ 180
          scripts/ci-wait-url.sh storefront http://localhost:3000/ 300

      - name: E2E smoke
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_STORE_URL: http://localhost:3000
        run: node apps/e2e/scripts/run-playwright.mjs test --grep @smoke --pass-with-no-tests

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
