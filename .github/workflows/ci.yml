name: CI

on:
  push:
    branches: [main, master, feat/**]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lojao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lojao"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lojao
      PGSSL: disable
      SESSION_SECRET: ci-session-secret
      TENANT_SLUG: loja
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: API tests
        run: pnpm --filter api test

      - name: DB migrate tests
        run: pnpm --filter @lojao/db test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e run install:browsers

      - name: Start stack
        run: |
          docker compose up --build -d
          docker compose ps
          timeout 180 bash -c 'until curl -sf http://localhost:3001/health; do sleep 3; done'
          timeout 180 bash -c 'until curl -sf http://localhost:5173/; do sleep 3; done'
          timeout 180 bash -c 'until curl -sf http://localhost:3000/; do sleep 3; done'

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lojao
        run: pnpm --filter api seed:dev || true

      - name: E2E smoke
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_STORE_URL: http://localhost:3000
        run: pnpm --filter e2e run test:smoke

      - name: Stop stack
        if: always()
        run: docker compose down -v
