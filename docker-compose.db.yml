# PostgreSQL apenas — desenvolvimento híbrido (apps no host + banco no Docker).
#
# Uso:
#   docker compose -f docker-compose.db.yml up -d
#   cp .env.example .env   # DATABASE_URL com localhost:5432
#   pnpm install && pnpm dev
#
# O volume `pgdata` é compartilhado com docker-compose.yml (mesmo projeto Compose).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lojao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lojao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
