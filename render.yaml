# Render Blueprint — Lojão (monorepo pnpm)
#
# Cenário A: New → Blueprint no dashboard Render, repo ramonixl/loja2, branch master.
# Depois de aplicar: preencher secrets (Stripe, e-mail, etc.) e apagar o serviço legado
# que ainda apontava para `node src/server.js`.
#
# Runbook: docs/migration/runbooks/render-blueprint.md

version: "1"

databases:
  - name: lojao-db
    plan: free
    databaseName: lojao
    user: lojao

services:
  # --- API (Fastify) ---
  - type: web
    name: lojao-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter api... build
    startCommand: pnpm --filter api exec tsx src/index.ts
    healthCheckPath: /health
    # Disco persistente exige plano pago — no free tier uploads são efêmeros (somem no redeploy).
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lojao-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: TENANT_SLUG
        value: loja
      - key: UPLOAD_DIR
        value: data/uploads/images
      - key: COOKIE_SAME_SITE
        value: none
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_SENHA
        sync: false
      - key: ADMIN_NOME
        value: Administrador
      - key: APP_URL
        fromService:
          type: web
          name: lojao-storefront
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_URL
        fromService:
          type: web
          name: lojao-admin
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUMUP_API_KEY
        sync: false
      - key: SUMUP_MERCHANT_CODE
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # --- Vitrine (Next.js) — URL pública principal ---
  - type: web
    name: lojao-storefront
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter storefront... build
    startCommand: pnpm --filter storefront start:render
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: TENANT_SLUG
        value: loja
      - key: NEXT_PUBLIC_TENANT_SLUG
        value: loja
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL

  # --- Admin (Vite → static site) ---
  - type: web
    name: lojao-admin
    runtime: static
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter admin... build
    staticPublishPath: apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_TENANT_SLUG
        value: loja
      - key: VITE_API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_STOREFRONT_URL
        fromService:
          type: web
          name: lojao-storefront
          envVarKey: RENDER_EXTERNAL_URL
