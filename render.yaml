# Render Blueprint — Lojão / Ata Labs (monorepo pnpm)
#
# Produção Ata Labs: atalabs.com.br (storefront), app.atalabs.com.br (admin),
# cdn.atalabs.com.br (R2 CDN — fora do Render). API: lojao-api.onrender.com.
#
# Cenário A: New → Blueprint no dashboard Render, repo ramonixl/loja2, branch master.
# Depois de aplicar: preencher secrets (Stripe, e-mail, etc.) e apagar o serviço legado
# que ainda apontava para `node src/server.js`.
#
# Runbook: docs/migration/runbooks/render-blueprint.md

version: "1"

databases:
  - name: lojao-db
    plan: free
    databaseName: lojao
    user: lojao

services:
  # --- API (Fastify) ---
  - type: web
    name: lojao-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter api... build
    startCommand: pnpm --filter api start:dist
    healthCheckPath: /health
    # Produção: use STORAGE_PROVIDER=r2 (uploads no Cloudflare R2). Disco local no free tier é efêmero.
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lojao-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: TENANT_SLUG
        value: demo
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_DELIVERY
        value: cdn
      - key: R2_PUBLIC_URL
        value: https://cdn.atalabs.com.br
      - key: UPLOAD_DIR
        value: data/uploads/images
      - key: R2_ACCOUNT_ID
        value: 66836ec0393e82929ae0c3090b013f9d
      - key: R2_BUCKET
        value: ata-commerce
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: COOKIE_SAME_SITE
        value: none
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_SENHA
        sync: false
      - key: ADMIN_NOME
        value: Administrador
      - key: MASTER_EMAIL
        sync: false
      - key: MASTER_PASSWORD
        sync: false
      - key: APP_URL
        value: https://atalabs.com.br
      - key: ADMIN_URL
        value: https://app.atalabs.com.br
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUMUP_API_KEY
        sync: false
      - key: SUMUP_MERCHANT_CODE
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  # --- Vitrine (Next.js) — URL pública principal ---
  - type: web
    name: lojao-storefront
    runtime: node
    plan: free
    region: oregon
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter storefront... build
    startCommand: pnpm --filter storefront start:render
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_DEFAULT_STORE_SLUG
        value: demo
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_ADMIN_URL
        value: https://app.atalabs.com.br
      - key: NEXT_PUBLIC_CDN_URL
        value: https://cdn.atalabs.com.br

  # --- Admin (Vite → static site) ---
  - type: web
    name: lojao-admin
    runtime: static
    buildCommand: corepack enable && NODE_ENV=development CI=true pnpm install --frozen-lockfile && pnpm --filter admin... build
    staticPublishPath: apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: VITE_API_URL
        fromService:
          type: web
          name: lojao-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_STOREFRONT_URL
        value: https://atalabs.com.br
      - key: VITE_CDN_URL
        value: https://cdn.atalabs.com.br
