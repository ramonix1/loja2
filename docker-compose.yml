services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: dev
    working_dir: /app/apps/api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lojao
      PGSSL: disable
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-troque-em-producao}
      TENANT_SLUG: loja
      ADMIN_EMAIL: admin@loja.com
      ADMIN_SENHA: admin123
      ADMIN_NOME: Administrador
      APP_URL: http://localhost:3000
      ADMIN_URL: http://localhost:5173
      API_URL: http://api:3001
      UPLOAD_DIR: /app/data/uploads/images
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-66836ec0393e82929ae0c3090b013f9d}
      R2_BUCKET: ${R2_BUCKET:-ata-commerce}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_DELIVERY: ${R2_DELIVERY:-proxy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SUMUP_API_KEY: ${SUMUP_API_KEY:-}
      SUMUP_MERCHANT_CODE: ${SUMUP_MERCHANT_CODE:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - api_root_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - api_db_node_modules:/app/packages/db/node_modules
      - api_types_node_modules:/app/packages/types/node_modules
      - upload_data:/app/data/uploads/images
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.admin
      target: dev
    working_dir: /app/apps/admin
    ports:
      - "5173:5173"
    environment:
      API_URL: http://api:3001
      VITE_API_URL: http://localhost:3001
      VITE_TENANT_SLUG: loja
      VITE_STOREFRONT_URL: http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - admin_root_node_modules:/app/node_modules
      - admin_app_node_modules:/app/apps/admin/node_modules
      - admin_ui_node_modules:/app/packages/ui/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  storefront:
    build:
      context: .
      dockerfile: docker/Dockerfile.storefront
      target: dev
    working_dir: /app/apps/storefront
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      TENANT_SLUG: loja
      NEXT_PUBLIC_DEFAULT_STORE_SLUG: loja
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - storefront_root_node_modules:/app/node_modules
      - storefront_app_node_modules:/app/apps/storefront/node_modules
      - storefront_ui_node_modules:/app/packages/ui/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  caddy:
    profiles: ["proxy"]
    image: caddy:2.8-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - storefront
      - admin

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lojao
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lojao"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  upload_data:
  api_root_node_modules:
  api_app_node_modules:
  api_db_node_modules:
  api_types_node_modules:
  admin_root_node_modules:
  admin_app_node_modules:
  admin_ui_node_modules:
  storefront_root_node_modules:
  storefront_app_node_modules:
  storefront_ui_node_modules:
