# Override para CI (GitHub Actions).
#
# Código via bind mount; node_modules via volumes anônimos da imagem Docker (Alpine/musl).
# O host GHA é Ubuntu/glibc — montar node_modules do runner quebra Rollup/SWC no container
# (ex.: @rollup/rollup-linux-x64-musl). Entrypoint não sincroniza deps no CI.
services:
  api:
    environment:
      GITHUB_ACTIONS: "true"
      SKIP_DOCKER_DEPS_SYNC: "true"
    volumes: !override
      - .:/app
      - upload_data:/app/data/uploads/images
      - /app/node_modules
      - /app/apps/api/node_modules

  admin:
    environment:
      GITHUB_ACTIONS: "true"
      SKIP_DOCKER_DEPS_SYNC: "true"
    volumes: !override
      - .:/app
      - /app/node_modules
      - /app/apps/admin/node_modules

  storefront:
    environment:
      GITHUB_ACTIONS: "true"
      SKIP_DOCKER_DEPS_SYNC: "true"
    volumes: !override
      - .:/app
      - /app/node_modules
      - /app/apps/storefront/node_modules
